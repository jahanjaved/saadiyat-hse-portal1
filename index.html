<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Flag Performance Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Dashboard</div>
        <h1 id="pageTitle">Red Flag Performance Matrix</h1>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20l-3.5-3.5"></path>
          </svg>
          <input type="search" id="clusterSearch" placeholder="Search cluster">
        </div>
        <div class="updated" id="lastUpdated"></div>
      </div>
    </header>

    <section class="kpi-grid" id="kpiGrid"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Red Flag Matrix</h2>
      </div>
      <div class="table-wrap">
        <table id="matrixTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script id="embedded-json" type="application/json"></script>
  <script src="app.js"></script>
</body>
</html>
