<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saadiyat Lagoons HSE Workbook Portal</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">
        <div class="brand-mark">HSE</div>
        <div>
          <strong>Saadiyat Lagoons</strong>
          <span>All-Sheets Workbook Portal</span>
        </div>
      </div>
      <nav class="topnav" id="topnav"></nav>
    </div>
  </header>

  <main class="wrap main-content">
    <section id="home" class="section">
      <div class="hero">
        <div>
          <div class="eyebrow">Professional one-page portal</div>
          <h1>All Excel sheets displayed in one website.</h1>
          <p>This portal converts the workbook into one readable project website for management, consultant, contractor, and follow-up review.</p>
        </div>
        <div class="hero-meta" id="heroMeta"></div>
      </div>

      <div class="summary-grid" id="summaryGrid"></div>
    </section>

    <div id="sheetSections"></div>
  </main>

  <script src="scripts/app.js"></script>
</body>
</html>
